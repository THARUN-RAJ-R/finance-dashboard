spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:postgresql://127.0.0.1:5431/finance_db_test
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: 127.0.0.1
      port: 6380

  cache:
    type: none

app:
  jwt:
    secret: NDBORTYzNTJSZlVqWDhuMnJyNXV4L0EzRkQ0KEcoSGI1UGU1VGgzd3chaHBDKkYpSlFCMQ==
    expiration-seconds: 86400
    refresh-expiration-seconds: 604800
  default-currency: USD
  pagination:
    default-page-size: 20
    max-page-size: 100
  rate-limit:
    login-capacity: 1000000
    login-refill-seconds: 1

server:
  port: 0

logging:
  level:
    com.finance.dashboard: INFO
    org.springframework.security: WARN
