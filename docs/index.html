<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Finance Dashboard API — Documentation</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Finance Dashboard REST API documentation — Spring Boot 3, RBAC, JWT, Redis, PostgreSQL" />
    <link rel="icon" href="https://raw.githubusercontent.com/redocly/redoc/main/docs/images/redoc.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0d1117;
      }

      /* ── Top Banner ───────────────────────────────────────── */
      .banner {
        background: linear-gradient(135deg, #1a1f2e 0%, #0f172a 50%, #1a1f2e 100%);
        border-bottom: 1px solid #30363d;
        padding: 20px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 1000;
        backdrop-filter: blur(10px);
      }

      .banner-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .logo {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      .banner-title {
        color: #f0f6fc;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.3px;
      }

      .banner-subtitle {
        color: #8b949e;
        font-size: 13px;
        margin-top: 2px;
      }

      .banner-badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .badge {
        background: rgba(56, 139, 253, 0.15);
        color: #58a6ff;
        border: 1px solid rgba(56, 139, 253, 0.3);
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        font-family: 'SFMono-Regular', Consolas, monospace;
        letter-spacing: 0.3px;
      }

      .badge.green {
        background: rgba(46, 160, 67, 0.15);
        color: #3fb950;
        border-color: rgba(46, 160, 67, 0.3);
      }

      .badge.purple {
        background: rgba(188, 140, 255, 0.15);
        color: #bc8cff;
        border-color: rgba(188, 140, 255, 0.3);
      }

      /* ── Redoc Container ──────────────────────────────────── */
      #redoc-container {
        background: #ffffff;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>

    <!-- Professional header banner -->
    <div class="banner">
      <div class="banner-left">
        <div class="logo">💰</div>
        <div>
          <div class="banner-title">Finance Dashboard API</div>
          <div class="banner-subtitle">Spring Boot 3 · PostgreSQL · Redis · JWT</div>
        </div>
      </div>
      <div class="banner-badges">
        <span class="badge green">✓ 126 Tests Passing</span>
        <span class="badge">v1.0.0</span>
        <span class="badge purple">RBAC · Audit · ETags</span>
      </div>
    </div>

    <!-- Redoc renders here -->
    <div id="redoc-container"></div>

    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
    <script>
      Redoc.init(
        // Points to the openapi.json in the GitHub repo root
        'https://raw.githubusercontent.com/THARUN-RAJ-R/finance-dashboard/main/openapi.json',
        {
          theme: {
            colors: {
              primary: { main: '#3b82f6' },
              success: { main: '#3fb950' },
              error:   { main: '#f85149' },
            },
            typography: {
              fontSize: '15px',
              fontFamily: 'Inter, -apple-system, sans-serif',
              headings: {
                fontFamily: 'Inter, -apple-system, sans-serif',
                fontWeight: '700',
              },
              code: {
                fontFamily: 'SFMono-Regular, Consolas, monospace',
                fontSize: '13px',
              }
            },
            sidebar: {
              width: '280px',
              backgroundColor: '#0d1117',
              textColor: '#8b949e',
            },
            rightPanel: {
              backgroundColor: '#161b22',
              textColor: '#e6edf3',
            },
          },
          hideDownloadButton: false,
          disableSearch: false,
          expandResponses: '200,201',
          pathInMiddlePanel: false,
          nativeScrollbars: false,
        },
        document.getElementById('redoc-container')
      );
    </script>

  </body>
</html>
