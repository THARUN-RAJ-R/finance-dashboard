version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: finance_db_test
    environment:
      POSTGRES_DB:       finance_db_test
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_db_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: finance_redis_test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
