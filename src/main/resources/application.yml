spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finance_db?TimeZone=UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1996}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  cache:
    type: redis
    redis:
      time-to-live: 300000   # 5 minutes in ms

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F442847284862506554683777217A25432A46294A4042}
    expiration-seconds: ${JWT_EXPIRY_SECONDS:86400}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRY_SECONDS:604800}   # 7 days
  default-currency: USD
  pagination:
    default-page-size: 20
    max-page-size: 100
  rate-limit:
    login-capacity: 10           # max requests
    login-refill-seconds: 60     # per this many seconds per IP

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  info:
    title: Finance Dashboard API
    description: REST API for the Finance Dashboard system with RBAC
    version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
    metrics:
      enabled: true

logging:
  level:
    com.finance.dashboard: INFO
    org.springframework.security: WARN
